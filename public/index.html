<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E8650A">
<title>長庚科技大學校車查詢 | CGUST Bus Query</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#E8650A;
  --orange-dark:#C4520A;
  --orange-light:#FDF0E8;
  --orange-mid:#F28240;
  --green:#2D6A1F;
  --green-light:#EBF4E8;
  --white:#FFFFFF;
  --off-white:#FAF8F5;
  --ink:#1A1208;
  --ink-mid:#5A4A38;
  --ink-light:#9A8A78;
  --border:#E8E0D5;
  --success:#0f6e56;
  --success-light:#e1f5ee;
  --focus:#FFD700;
  --r:14px;--rs:10px;
  --shadow:0 2px 12px rgba(232,101,10,0.10);
  --shadow-card:0 1px 6px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{
  font-family:'Noto Sans TC',system-ui,sans-serif;
  background:var(--off-white);
  color:var(--ink);
  min-height:100vh;
}

/* Accessibility */
.skip-link{position:absolute;left:-9999px;top:0;background:var(--focus);color:#000;padding:8px 16px;font-weight:700;z-index:9999;border-radius:0 0 8px 0;}
.skip-link:focus{left:0;}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;}

/* ── HEADER ── */
header{
  background:var(--orange);
  color:white;
  padding:0;
  position:relative;
  overflow:hidden;
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem 1.25rem;
  position:relative;z-index:2;
}
/* Decorative arc in header */
header::after{
  content:'';
  position:absolute;
  right:-40px;top:-60px;
  width:180px;height:180px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  z-index:1;
}
header::before{
  content:'';
  position:absolute;
  right:40px;bottom:-50px;
  width:120px;height:120px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
  z-index:1;
}

.logo-area{display:flex;align-items:center;gap:10px;}
.logo-icon{
  width:38px;height:38px;flex-shrink:0;
  background:white;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.logo-icon img{width:100%;height:100%;object-fit:contain;}
/* Fallback if no img */
.logo-fallback{
  width:38px;height:38px;flex-shrink:0;
  background:white;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;
}
.logo-text h1{
  font-family:'Barlow',sans-serif;
  font-size:.95rem;font-weight:800;
  letter-spacing:.01em;line-height:1.2;
}
.logo-text span{font-size:.68rem;opacity:.88;display:block;letter-spacing:.03em;}

.lang-btn{
  background:rgba(255,255,255,.18);
  border:1.5px solid rgba(255,255,255,.55);
  color:white;padding:7px 15px;border-radius:20px;
  cursor:pointer;font-size:.82rem;font-weight:600;
  min-width:58px;min-height:40px;font-family:'Barlow',sans-serif;
  letter-spacing:.05em;transition:background .15s;
}
.lang-btn:hover{background:rgba(255,255,255,.28);}

/* Orange stripe accent */
.header-stripe{
  height:4px;
  background:linear-gradient(90deg, var(--green) 0%, var(--green) 30%, transparent 100%);
}

/* ── MODE TABS ── */
.mode-bar{
  background:white;
  border-bottom:1.5px solid var(--border);
  display:flex;
  padding:0 1.25rem;
  gap:0;
}
.mode-tab{
  padding:.8rem 1.4rem;
  font-size:.92rem;font-weight:600;
  cursor:pointer;
  border-bottom:3px solid transparent;
  color:var(--ink-light);
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:'Noto Sans TC',sans-serif;
  min-height:48px;transition:color .15s;
  position:relative;
}
.mode-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.mode-tab:hover{color:var(--orange-mid);}

/* ── MAIN ── */
.main{max-width:600px;margin:0 auto;padding:1.25rem 1rem 2.5rem;}

/* ── CARD ── */
.card{
  background:white;
  border-radius:var(--r);
  border:.5px solid var(--border);
  padding:1.35rem;
  margin-bottom:1rem;
  box-shadow:var(--shadow-card);
}

/* ── SIMPLE CHIPS ── */
.chips-label{
  font-size:.8rem;font-weight:700;
  color:var(--orange);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:.9rem;display:flex;align-items:center;gap:6px;
}
.chips-label::before{
  content:'';width:3px;height:14px;background:var(--orange);border-radius:2px;display:inline-block;
}
.simple-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stop-chip{
  padding:.95rem .8rem;
  border-radius:var(--rs);
  border:2px solid var(--border);
  background:white;cursor:pointer;text-align:center;
  font-size:.92rem;font-weight:600;
  transition:all .18s;line-height:1.35;
  font-family:'Noto Sans TC',sans-serif;
  color:var(--ink);
  min-height:68px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;
  position:relative;overflow:hidden;
}
.stop-chip::before{
  content:'';
  position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--border);
  transition:background .18s;
}
.stop-chip:hover{border-color:var(--orange-mid);background:var(--orange-light);}
.stop-chip:hover::before{background:var(--orange-mid);}
.stop-chip.selected{
  border-color:var(--orange);
  background:var(--orange);
  color:white;
  box-shadow:0 4px 14px rgba(232,101,10,.30);
}
.stop-chip.selected::before{background:rgba(255,255,255,.4);}
.stop-chip .sen{font-size:.68rem;opacity:.72;display:block;margin-top:3px;font-weight:400;font-family:'Barlow',sans-serif;letter-spacing:.02em;}

/* ── FORM ── */
.field-label{font-size:.8rem;color:var(--ink-mid);margin-bottom:5px;display:block;font-weight:600;}
.sw{position:relative;}
.sw::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--ink-light);font-size:.85rem;}
select,input[type=time],input[type=date]{
  width:100%;padding:11px 14px;
  border:2px solid var(--border);
  border-radius:var(--rs);font-size:.95rem;
  background:white;color:var(--ink);
  appearance:none;-webkit-appearance:none;outline:none;
  min-height:48px;font-family:'Noto Sans TC',sans-serif;
  transition:border-color .15s;
}
select:focus,input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,101,10,.12);}
.std-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:flex-end;margin-bottom:1rem;}
.swap-btn{
  width:44px;height:44px;border-radius:50%;
  border:2px solid var(--orange);
  background:white;color:var(--orange);
  cursor:pointer;font-size:1.15rem;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;
}
.swap-btn:hover{background:var(--orange);color:white;}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.1rem;}
.search-btn{
  width:100%;padding:14px;
  background:var(--orange);color:white;
  border:none;border-radius:var(--rs);
  font-size:1rem;cursor:pointer;font-weight:700;
  font-family:'Barlow',sans-serif;letter-spacing:.04em;
  min-height:52px;
  transition:background .15s;
  box-shadow:0 3px 10px rgba(232,101,10,.25);
}
.search-btn:hover{background:var(--orange-dark);}

/* ── RESULTS ── */
.sec-lbl{
  font-size:.72rem;font-weight:700;
  color:var(--ink-light);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:.85rem;padding:0 2px;
  font-family:'Barlow',sans-serif;
}

.ri{
  border-radius:var(--rs);
  border:.5px solid var(--border);
  padding:1.1rem 1.1rem 1rem;
  margin-bottom:.8rem;background:white;
  box-shadow:var(--shadow-card);
  position:relative;overflow:hidden;
  transition:box-shadow .15s;
}
.ri:hover{box-shadow:0 3px 14px rgba(0,0,0,.10);}
.ri::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;
}
.ri.school::before{background:var(--orange);}
.ri.bus::before{background:var(--green);}

.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.45rem;gap:8px;}
.rn{font-weight:700;font-size:.98rem;line-height:1.3;font-family:'Barlow',sans-serif;letter-spacing:.01em;}

.badge{font-size:.68rem;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap;flex-shrink:0;font-family:'Barlow',sans-serif;letter-spacing:.04em;}
.bs{background:var(--orange-light);color:var(--orange);}
.bb{background:var(--green-light);color:var(--green);}

.td{
  font-size:1.45rem;font-weight:800;
  color:var(--orange);
  margin-bottom:.4rem;
  font-family:'Barlow',sans-serif;letter-spacing:.02em;
  line-height:1.1;
}
.ri.bus .td{color:var(--green);}

.dir-label{font-size:.75rem;color:var(--ink-light);margin-bottom:.4rem;font-style:italic;}

.stops-row{
  display:flex;align-items:center;
  gap:4px;flex-wrap:wrap;
  font-size:.78rem;color:var(--ink-light);
}
.sl2{color:var(--ink-mid);}
.sh{color:var(--ink);font-weight:600;}
.arr{color:var(--border);margin:0 1px;font-size:.85rem;}

.dur{
  font-size:.74rem;color:var(--ink-light);
  margin-top:6px;
  font-family:'Barlow',sans-serif;letter-spacing:.02em;
}

.soon{
  display:inline-flex;align-items:center;
  background:#FFF3CD;color:#9A6000;
  font-size:.68rem;padding:3px 9px;border-radius:20px;
  margin-left:7px;font-weight:700;
  font-family:'Barlow',sans-serif;letter-spacing:.03em;
}

.api-badge{
  font-size:.65rem;padding:2px 7px;border-radius:8px;
  background:#F0F0F0;color:#666;
  margin-left:5px;font-weight:500;
  font-family:'Barlow',sans-serif;
}
.api-badge.live{background:#e1f5ee;color:#0f6e56;}

.route-link{
  color:inherit;text-decoration:none;
  border-bottom:1.5px dashed var(--green);
  padding-bottom:1px;transition:opacity .15s;
}
.route-link:hover{opacity:.7;}

.nearby{
  font-size:.73rem;color:#9A6000;
  margin-top:5px;display:flex;align-items:flex-start;gap:5px;
  background:#FFF8E8;border-radius:6px;padding:5px 8px;
}

.empty{text-align:center;padding:3rem 1rem;color:var(--ink-light);}
.empty-icon{font-size:2.5rem;margin-bottom:.75rem;}
.limit-note{font-size:.72rem;color:var(--ink-light);text-align:center;padding:.5rem 0;font-style:italic;}
.loading{text-align:center;padding:2rem;color:var(--ink-light);font-size:.9rem;}

/* ── FOOTER ── */
footer{
  background:white;border-top:1.5px solid var(--border);
  text-align:center;padding:1rem 1.25rem;
  font-size:.73rem;color:var(--ink-light);
}

/* Animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.ri{animation:fadeUp .2s ease both;}
.ri:nth-child(2){animation-delay:.04s;}
.ri:nth-child(3){animation-delay:.08s;}
.ri:nth-child(4){animation-delay:.12s;}
.ri:nth-child(5){animation-delay:.16s;}
</style>
</head>

</div>
</main>

function busInfoUrl(n){return `https://www.taiwanbus.tw/eBUS/index.html#search?routeNo=${n}`;}
function sn(id){const s=ALL_STOPS.find(x=>x.id===id);if(!s)return id;return L.cur==='zh'?s.zh:s.en;}
function toMin(t){if(!t)return 9999;const[h,m]=t.split(':').map(Number);return h*60+m;}
function nm(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function dow(){const d=new Date().getDay();return d===0?7:d;}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function getMockBusTripsForStop(stopId){
  const n=nm(),d=dow();
  return BUS_MOCK.filter(m=>{
    if(!m.days.includes(d))return false;
    const idx=m.stops.findIndex(s=>s.id===stopId);
    if(idx===-1)return false;
    return toMin(m.stops[idx].t)>=n;
  }).map(m=>{
    const route=BUS_ROUTES.find(r=>r.routeNo===m.routeNo);
    const dir=route.directions[m.dirIdx];
    const idx=m.stops.findIndex(s=>s.id===stopId);
    return {routeNo:m.routeNo,route,dir,stopId,arrivalTime:m.stops[idx].t,isLive:false,stops:m.stops};
  }).sort((a,b)=>toMin(a.arrivalTime)-toMin(b.arrivalTime));
}

function getMockBusTripsForRoute(fromId,toId,dowVal,afterMin){
  return BUS_MOCK.filter(m=>{
    if(!m.days.includes(dowVal))return false;
    const ids=m.stops.map(s=>s.id);
    const fi=ids.indexOf(fromId),ti=ids.indexOf(toId);
    if(fi===-1||ti===-1||fi>=ti)return false;
    return toMin(m.stops[fi].t)>=afterMin;
  }).map(m=>{
    const route=BUS_ROUTES.find(r=>r.routeNo===m.routeNo);
    const dir=route.directions[m.dirIdx];
    const ids=m.stops.map(s=>s.id);
    const fi=ids.indexOf(fromId),ti=ids.indexOf(toId);
    return {routeNo:m.routeNo,route,dir,depTime:m.stops[fi].t,arrTime:m.stops[ti].t,isLive:false,stops:m.stops,fi,ti};
  }).sort((a,b)=>toMin(a.depTime)-toMin(b.depTime));
}

// 將 TDX 到站資料轉換為系統格式
// 支援兩種格式：EstimateTime（秒）和 NextBusTime（絕對時間）
function parseTDXArrival(a){
  // StopStatus: 0=正常, 1=尚未發車, 2=不發車, 3=停駛
  if(a.StopStatus===2||a.StopStatus===3) return null; // 停駛/不發車
  let estSeconds = null;
  let arrivalTime = null;
  const now = Date.now();
  if(a.EstimateTime!=null&&a.EstimateTime>=0){
    // 新北市格式：EstimateTime 為秒數
    estSeconds = a.EstimateTime;
    const t = new Date(now+estSeconds*1000);
    arrivalTime = String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
  } else if(a.NextBusTime){
    // 桃園市格式：NextBusTime 為 ISO 時間字串
    const t = new Date(a.NextBusTime);
    if(isNaN(t.getTime())) return null;
    estSeconds = Math.round((t.getTime()-now)/1000);
    if(estSeconds<-60) return null; // 已過站超過1分鐘，忽略
    arrivalTime = String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
  } else {
    return null; // 無時間資料
  }
  return {estSeconds, arrivalTime};
}

async function getBusTripsForStop(sid){
  try {
    if(!TDX_CONFIG.ENABLED) return getMockBusTripsForStop(sid);
    const tdxName = Object.entries(STOP_MAP).find(([k,v])=>v===sid)?.[0];
    if(!tdxName) return getMockBusTripsForStop(sid);
    const relevantRoutes = BUS_ROUTES.filter(r=>r.directions.some(d=>d.stops.includes(sid)));
    if(!relevantRoutes.length) return [];

    // 同一站可能跨兩個縣市（例如候車亭有桃園和新北的公車）
    const cities = [...new Set(relevantRoutes.map(r=>r.tdxCity))];
    const allArrivals = [];
    for(const city of cities){
      const res = await fetch(`/api/tdx-bus?city=${encodeURIComponent(city)}&stop=${encodeURIComponent(tdxName)}`);
      if(!res.ok){ console.error('TDX proxy error:', res.status, city); continue; }
      const json = await res.json();
      allArrivals.push(...(json.data||[]));
    }

    const results = [];
    allArrivals.forEach(a=>{
      // 比對路線名稱（TDX 的 RouteName.Zh_tw）
      const routeNameTdx = a.RouteName?.Zh_tw||'';
      const route = BUS_ROUTES.find(r=>r.routeNo===routeNameTdx||r.tdxRouteName===routeNameTdx);
      if(!route) return;
      const dirIdx = a.Direction??0;
      const dir = route.directions[dirIdx];
      if(!dir||!dir.stops.includes(sid)) return;
      const parsed = parseTDXArrival(a);
      if(!parsed) return;
      results.push({
        routeNo:route.routeNo, route, dir, dirIdx,
        stopId:sid, arrivalTime:parsed.arrivalTime,
        isLive:true, estSeconds:parsed.estSeconds,
        plateNo:a.PlateNumb||''
      });
    });
    return results.sort((a,b)=>a.estSeconds-b.estSeconds);
  } catch(e) {
    console.error('getBusTripsForStop error:', e);
    return getMockBusTripsForStop(sid);
  }
}
async function getBusTripsForRoute(fromId,toId,dowVal,afterMin){
  try {
    if(!TDX_CONFIG.ENABLED) return getMockBusTripsForRoute(fromId,toId,dowVal,afterMin);
    const results = [];
    for(const route of BUS_ROUTES){
      for(let di=0;di<route.directions.length;di++){
        const dir = route.directions[di];
        const fi = dir.stops.indexOf(fromId);
        const ti = dir.stops.indexOf(toId);
        if(fi===-1||ti===-1||fi>=ti) continue;
        const fromTdxName = Object.entries(STOP_MAP).find(([k,v])=>v===fromId)?.[0];
        if(!fromTdxName) continue;
        const res = await fetch(`/api/tdx-bus?city=${encodeURIComponent(route.tdxCity)}&stop=${encodeURIComponent(fromTdxName)}`);
        if(!res.ok) continue;
        const json = await res.json();
        const arrivals = json.data||[];
        arrivals
          .filter(a=>(a.RouteName?.Zh_tw===route.routeNo||a.RouteName?.Zh_tw===route.tdxRouteName)&&a.Direction===di)
          .forEach(a=>{
            const parsed = parseTDXArrival(a);
            if(!parsed) return;
            const depMin = Math.floor(Date.now()/60000)+Math.round(parsed.estSeconds/60);
            if(depMin<afterMin) return;
            results.push({routeNo:route.routeNo, route, dir,
              depTime:parsed.arrivalTime, isLive:true, estSeconds:parsed.estSeconds,
              stops:dir.stops.map(id=>({id})), fi, ti});
          });
      }
    }
    return results.sort((a,b)=>a.estSeconds-b.estSeconds);
  } catch(e) {
    console.error('getBusTripsForRoute error:', e);
    return getMockBusTripsForRoute(fromId,toId,dowVal,afterMin);
  }
}

    const sb=diff>=0&&diff<=10?`<span class="soon">⚡ ${zh?'即將到站':'ARRIVING SOON'}</span>`:'';
    const stopsHtml=item.stops?item.stops.map((s,i,a)=>
      `<span class="${s.id===hs?'sh':'sl2'}">${sn(s.id)}</span><span style="font-size:.68rem;color:#bbb;margin-left:2px;">${s.t}</span>${i<a.length-1?'<span class="arr">›</span>':''}`
    ).join(''):`<span class="sh">${sn(hs)}</span>`;
    return `<article class="ri bus" aria-label="${rn}">
      <div class="rh"><span class="rn">${nameHtml}${sb}</span>${badge}</div>
      <div class="dir-label">${dirLabel}</div>
      <div class="td">${zh?'到站':'ARRIVES'} ${at}</div>
      <div class="stops-row">${stopsHtml}</div>
      ${nearbyNote}
    </article>`;
  }else{
    const dep=item.depTime,arr=item.arrTime;
    const dur=dep&&arr?toMin(arr)-toMin(dep):null;
    const diff=toMin(dep)-nm();
    const sb=diff>=0&&diff<=10?`<span class="soon">⚡ ${zh?'即將發車':'DEPARTING SOON'}</span>`:'';
    const stopsHtml=item.stops&&fi!=null?item.stops.slice(fi,ti+1).map((s,i,a)=>
      `<span class="${i===0||i===a.length-1?'sh':'sl2'}">${sn(s.id)}</span>${i<a.length-1?'<span class="arr">›</span>':''}`
    ).join(''):'';
    return `<article class="ri bus" aria-label="${rn}">
      <div class="rh"><span class="rn">${nameHtml}${sb}</span>${badge}</div>
      <div class="dir-label">${dirLabel}</div>
      <div class="td">${dep||'--:--'}${arr?` → ${arr}`:''}</div>
      ${stopsHtml?`<div class="stops-row">${stopsHtml}</div>`:''}
      ${dur?`<div class="dur">${zh?'車程約':'EST.'} ${dur} ${zh?'分鐘':'MIN'}</div>`:''}
      ${nearbyNote}
    </article>`;
  }
}

function switchMode(m){
  const isS=m==='simple';
  document.getElementById('ms').style.display=isS?'':'none';
  document.getElementById('mstd').style.display=isS?'none':'';
  document.getElementById('ts').classList.toggle('active',isS);
  document.getElementById('ts').setAttribute('aria-selected',String(isS));
  document.getElementById('tstd').classList.toggle('active',!isS);
  document.getElementById('tstd').setAttribute('aria-selected',String(!isS));
}

function toggleLang(){
  L.cur=L.cur==='zh'?'en':'zh';
  const zh=L.cur==='zh';
  document.getElementById('lb').textContent=zh?'EN':'中文';
  document.documentElement.lang=zh?'zh-TW':'en';
  updateUI();renderChips();populateSel();
  if(sel) renderSR(); // 簡易模式：重新渲染結果
  // 標準模式：語言切換後清空結果，避免中英混雜
  const stdr=document.getElementById('stdr');
  if(stdr && stdr.innerHTML.trim()){
    stdr.innerHTML=`<div class="card" style="text-align:center;color:var(--ink-light);font-size:.88rem;padding:1.5rem;">
      ${zh?'語言已切換，請重新查詢':'Language changed — please search again'}
    </div>`;
  }
}

function updateUI(){
  const zh=L.cur==='zh';
  document.getElementById('ht').textContent=zh?'長庚科技大學校車查詢':'CGUST Bus Query';
  document.getElementById('hs').textContent='CHANG GUNG UNIVERSITY OF SCIENCE AND TECHNOLOGY';
  document.getElementById('ls').textContent=zh?'簡易':'SIMPLE';
  document.getElementById('lstd').textContent=zh?'標準':'STANDARD';
  document.getElementById('lf').textContent=zh?'出發站':'DEPARTURE';
  document.getElementById('lt').textContent=zh?'抵達站':'ARRIVAL';
  document.getElementById('ld').textContent=zh?'日期':'DATE';
  document.getElementById('ltm').textContent=zh?'時間（之後出發）':'DEPART AFTER';
  document.getElementById('bs2').textContent=zh?'查詢班次 SEARCH':'SEARCH TRIPS';
  document.getElementById('lps').textContent=zh?'選擇站點':'SELECT STOP';
  document.getElementById('ft').textContent=zh?'資料僅供參考，實際班次以現場為準 | For reference only':'For reference only | 資料僅供參考';
  document.title=zh?'長庚科技大學校車查詢 | CGUST Bus Query':'CGUST Bus Query System';
}

function init(){
  document.getElementById('id2').value=today();
  const n=new Date();
  document.getElementById('itm').value=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  renderChips();populateSel();
}
init();
</script>
